<div class="food-card">

    <div class="food-image">

        <a href="{{ food.get_absolute_url }}">
            <img src="{{ food.image.url }}" alt="{{ food.name }}">
        </a>

        {% if food.has_discount %}
            <span class="food-badge">
                {{ food.display_discount }}
            </span>
        {% endif %}

        <button class="wishlist-btn">
            <i class="fa-regular fa-heart"></i>
        </button>

    </div>

    <div class="food-content">

        <span class="food-category">
            {{ food.category.name }}
        </span>

        <h3>
            <a href="{{ food.get_absolute_url }}">
                {{ food.name }}
            </a>
        </h3>

        <div class="food-meta">

            <div class="food-rating">
                ★★★★★
                <span>({{ food.rating }})</span>
            </div>

            <span class="delivery">
                <i class="fa-solid fa-clock"></i>
                {{ food.preparation_time }} min
            </span>

        </div>

        <div class="food-footer">

            <div class="price-group">

                {% if food.has_discount %}
                    <span class="old-price">
                        KSh {{ food.original_price }}
                    </span>
                {% endif %}

                <span class="price">
                    KSh {{ food.price }}
                </span>

            </div>

            <a href="{% url 'menu:add_to_cart' food.id %}" class="cart-btn">
                <i class="fa-solid fa-cart-shopping"></i>
            </a>

        </div>

    </div>

</div>
