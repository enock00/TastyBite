{% load static %}
<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1">

    <title>

        {% block title %}

        TastyBite | Delicious Food Delivered Fast

        {% endblock %}

    </title>

    {% block meta_description %}

    <meta
        name="description"
        content="Order delicious meals online from TastyBite. Fresh food, fast delivery and secure online ordering.">

    {% endblock %}

    <meta
        name="theme-color"
        content="#F97316">

    <meta
        name="author"
        content="TastyBite">

    <meta
        name="robots"
        content="index, follow">

    <!-- Open Graph -->

    <meta
        property="og:title"
        content="TastyBite">

    <meta
        property="og:description"
        content="Fresh meals delivered fast.">

    <meta
        property="og:type"
        content="website">

    <!-- Twitter -->

    <meta
        name="twitter:card"
        content="summary_large_image">

    <!-- Favicon -->

    <link
        rel="icon"
        href="{% static 'images/favicon.ico' %}">

    <!-- Fonts -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icons -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Global Styles -->

    <link rel="stylesheet" href="{% static 'css/website.css' %}">

    {% block extra_css %}

    {% endblock %}

</head>

<body>

<div class="site-wrapper">

    <!-- Global Loader -->

    <div id="page-loader">

        <div class="loader"></div>

    </div>

    {% block content %}

    {% endblock %}

</div>

<!-- Global Scripts -->

<script src="{% static 'js/script.js' %}"></script>
<script src="{% static 'js/navbar.js' %}"></script>

{% block extra_js %}

{% endblock %}

</body>

</html>
