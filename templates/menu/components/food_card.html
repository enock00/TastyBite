{% load static %}

<article class="food-card">

    <!--=========================
            IMAGE
    ==========================-->

    <div class="food-image">

        {% if food.image %}

            <img src="{{ food.image.url }}"
                 alt="{{ food.name }}">

        {% else %}

            <img src="{% static 'images/default-food.jpg' %}"
                 alt="{{ food.name }}">

        {% endif %}

        <!-- Featured Badge -->

        {% if food.is_featured %}

            <span class="food-badge">

                🔥 Featured

            </span>

        {% endif %}

        <!-- Wishlist -->

        <button class="wishlist-btn">

            <i class="far fa-heart"></i>

        </button>

    </div>

    <!--=========================
            CONTENT
    ==========================-->

    <div class="food-content">

        <!-- Top Row -->

        <div class="food-meta">

            <span class="rating">

                ⭐ 4.9

            </span>

            <span class="delivery-time">

                <i class="fas fa-clock"></i>

                20 min

            </span>

        </div>

        <!-- Category -->

        {% if food.category %}

        <span class="category-tag">

            {{ food.category.name }}

        </span>

        {% endif %}

        <!-- Title -->

        <h3>

            <a href="{% url 'menu:food_detail' food.slug %}">

                {{ food.name }}

            </a>

        </h3>

        <!-- Description -->

        <p>

            {{ food.description|truncatewords:18 }}

        </p>

        <!-- Bottom -->

        <div class="food-footer">

            <div>

                <small>

                    Starting From

                </small>

                <h4>

                    KSh {{ food.price }}

                </h4>

            </div>

            <a href="{% url 'cart:cart_add' food.id %}"

               class="add-cart">

                <i class="fas fa-plus"></i>

            </a>

        </div>

    </div>

</article>
