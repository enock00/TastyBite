<div class="category-tabs">

    <!-- All Categories -->

    <a href="{% url 'menu:menu' %}"
       class="category-pill {% if not category %}active{% endif %}">

        <i class="fas fa-utensils"></i>

        <span>All</span>

    </a>

    <!-- Dynamic Categories -->

    {% for item in categories %}

    <a href="{{ item.get_absolute_url }}"
       class="category-pill {% if category and category.id == item.id %}active{% endif %}">

        {% if item.icon %}

            <i class="fas {{ item.icon }}"></i>

        {% else %}

            <i class="fas fa-bowl-food"></i>

        {% endif %}

        <span>

            {{ item.name }}

        </span>

        <small>

            {{ item.food_items.count }}

        </small>

    </a>

    {% endfor %}

</div>
