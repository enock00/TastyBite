{% load static %}

<header class="header">

    <div class="container navbar">

        <!-- Logo -->
        <a href="{% url 'core:home' %}" class="logo">

            <i class="fas fa-utensils"></i>

            <span>Tasty<span class="orange">Bite</span></span>

        </a>

        <!-- Desktop Navigation -->
        <nav class="nav-menu" id="nav-menu">

            <ul class="nav-list">

                <li>
                    <a href="{% url 'core:home' %}"
                       class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">
                        Home
                    </a>
                </li>

                <li>
                    <a href="{% url 'menu:menu' %}"
                       class="{% if request.resolver_match.url_name == 'menu' %}active{% endif %}">
                        Menu
                    </a>
                </li>

                <li><a href="#">Offers</a></li>

                <li><a href="#">About</a></li>

                <li><a href="#">Contact</a></li>

            </ul>

        </nav>

        <!-- Search -->
        <form action="{% url 'menu:menu' %}"
              method="GET"
              class="search-box">

            <i class="fas fa-search"></i>

            <input
                type="search"
                name="search"
                value="{{ request.GET.search }}"
                placeholder="Search food...">

        </form>

        <!-- Right Side -->
        <div class="nav-actions">

            <a href="#" class="icon-btn">

                <i class="far fa-heart"></i>

                <span class="badge">2</span>

            </a>

            <a href="{% url 'cart:cart_detail' %}"
               class="icon-btn">

                <i class="fas fa-shopping-cart"></i>

                {% if cart|length %}
                    <span class="badge">
                        {{ cart|length }}
                    </span>
                {% endif %}

            </a>

            {% if user.is_authenticated %}

            <div class="profile-menu">

                <button class="profile-btn">

                    <i class="far fa-user-circle"></i>

                    <span>

                        {{ user.first_name|default:user.username }}

                    </span>

                    <i class="fas fa-chevron-down"></i>

                </button>

                <div class="dropdown">

                    <a href="#">My Profile</a>

                    <a href="#">My Orders</a>

                    <a href="#">Wishlist</a>

                    <hr>

                    <a href="#">Logout</a>

                </div>

            </div>

            {% else %}

            <a href="#" class="login-btn">

                Login

            </a>

            {% endif %}

            <a href="{% url 'menu:menu' %}"
               class="order-btn">

                Order Now

            </a>

            <button class="menu-toggle"
                    id="menu-toggle">

                <i class="fas fa-bars"></i>

            </button>

        </div>

    </div>

</header>
